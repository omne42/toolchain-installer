[package]
name = "omne-process-primitives"
version = "0.1.0"
edition = "2024"
publish = false
description = "Low-level Omne process primitives."

[dependencies]
tokio = { version = "1", features = ["process"] }

[target.'cfg(unix)'.dependencies]
rustix = { version = "1.1.4", features = ["process"] }

[target.'cfg(windows)'.dependencies]
sysinfo = { version = "0.38.4", default-features = false, features = ["system"] }
win32job = "2.0.3"

[dev-dependencies]
tempfile = "3"
tokio = { version = "1", features = ["fs", "macros", "process", "rt", "rt-multi-thread", "time"] }
