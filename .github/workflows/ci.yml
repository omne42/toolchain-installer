name: ci

on:
  push:
    branches: ["main", "feat/**"]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Rust fmt
        run: cargo fmt --all -- --check

      - name: Rust check
        run: cargo check --all-targets

      - name: Rust test
        run: cargo test --all-targets

      - name: Worker test
        working-directory: worker
        run: npm test
