name: ci

on:
  push:
    branches: ["main", "feat/**"]
  pull_request:

jobs:
  rust-matrix:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust fmt
        run: cargo fmt --all -- --check

      - name: Rust check
        run: cargo check --locked --all-targets

      - name: Rust test
        run: cargo test --locked --all-targets

  rust-clippy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust clippy
        run: cargo clippy --locked --all-targets -- -D warnings

  install-smoke:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    env:
      GITHUB_TOKEN: ${{ github.token }}
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      TOOLCHAIN_INSTALLER_GITHUB_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Build release binary
        run: cargo build --locked --release

      - name: Live install smoke
        run: python scripts/install_smoke.py --binary target/release/toolchain-installer

  cli-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build binary
        run: cargo build --locked --release

      - name: Smoke bootstrap output
        run: |
          export OUT="$(./target/release/toolchain-installer --json --tool custom-tool)"
          python3 -c 'import json, os; data = json.loads(os.environ["OUT"]); assert data["schema_version"] == 1'

      - name: Smoke direct method output
        run: |
          export OUT="$(./target/release/toolchain-installer --json --method unknown --id demo)"
          python3 -c 'import json, os; data = json.loads(os.environ["OUT"]); assert data["items"][0]["status"] == "unsupported"'
