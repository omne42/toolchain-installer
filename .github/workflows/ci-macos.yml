name: ci macos

on:
  push:
    branches: ["main", "feat/**"]
  pull_request:
  workflow_dispatch:

jobs:
  rust-matrix:
    name: rust-matrix (macos-latest)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Checkout shared deps
        uses: ./.github/actions/checkout-shared-deps
        with:
          repo-owner: ${{ github.repository_owner }}
          token: ${{ secrets.OMNE_REPO_READ_TOKEN || github.token }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Resolve macOS temp root
        run: |
          REAL_TMPDIR="$(python3 - <<'PY'
          import os
          import pathlib

          print(pathlib.Path(os.environ["TMPDIR"]).resolve())
          PY
          )"
          {
            echo "TMPDIR=$REAL_TMPDIR"
            echo "TMP=$REAL_TMPDIR"
            echo "TEMP=$REAL_TMPDIR"
          } >> "$GITHUB_ENV"

      - name: Rust fmt
        run: cargo fmt --manifest-path Cargo.toml -- --check

      - name: Rust check
        run: cargo check --locked --all-targets

      - name: Rust test
        run: cargo test --locked --all-targets

  install-smoke:
    name: install-smoke (macos-latest)
    runs-on: macos-latest
    env:
      GITHUB_TOKEN: ${{ github.token }}
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      TOOLCHAIN_INSTALLER_GITHUB_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Checkout shared deps
        uses: ./.github/actions/checkout-shared-deps
        with:
          repo-owner: ${{ github.repository_owner }}
          token: ${{ secrets.OMNE_REPO_READ_TOKEN || github.token }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Resolve macOS temp root
        run: |
          REAL_TMPDIR="$(python3 - <<'PY'
          import os
          import pathlib

          print(pathlib.Path(os.environ["TMPDIR"]).resolve())
          PY
          )"
          {
            echo "TMPDIR=$REAL_TMPDIR"
            echo "TMP=$REAL_TMPDIR"
            echo "TEMP=$REAL_TMPDIR"
          } >> "$GITHUB_ENV"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Verify Bun
        run: bun --version

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.23"
          cache: false

      - name: Build release binary
        run: cargo build --locked --release

      - name: Live install smoke
        run: python scripts/install_smoke.py --binary target/release/toolchain-installer

  release-catalog-smoke:
    name: release-catalog-smoke (macos-latest)
    runs-on: macos-latest
    env:
      GITHUB_TOKEN: ${{ github.token }}
      TOOLCHAIN_INSTALLER_GITHUB_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Checkout shared deps
        uses: ./.github/actions/checkout-shared-deps
        with:
          repo-owner: ${{ github.repository_owner }}
          token: ${{ secrets.OMNE_REPO_READ_TOKEN || github.token }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Resolve macOS temp root
        run: |
          REAL_TMPDIR="$(python3 - <<'PY'
          import os
          import pathlib

          print(pathlib.Path(os.environ["TMPDIR"]).resolve())
          PY
          )"
          {
            echo "TMPDIR=$REAL_TMPDIR"
            echo "TMP=$REAL_TMPDIR"
            echo "TEMP=$REAL_TMPDIR"
          } >> "$GITHUB_ENV"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build release binary
        run: cargo build --locked --release

      - name: Live release catalog smoke
        run: python scripts/install_smoke.py --binary target/release/toolchain-installer --phase release_catalog
