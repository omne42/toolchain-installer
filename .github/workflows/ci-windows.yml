          $report | ConvertTo-Json -Depth 6 | Out-File -FilePath $reportPath -Encoding utf8

          Write-Host "persistent-cache: mirror_exists_before=$($repo.mirror_exists)"
          Write-Host "persistent-cache: worktree_exists_before=$($repo.repo_exists)"
          Write-Host "persistent-cache: cargo_registry_exists_before=$($before.cargo_registry_exists)"
          Write-Host "persistent-cache: target_exists_before=$($before.target_exists)"
          Write-Host "persistent-cache: repo_dir=$($env:TOOLCHAIN_INSTALLER_REPO_DIR)"
          Write-Host "persistent-cache: synced_sha=$($repo.head)"

          "repo_dir_bash=$repoDirBash" >> $env:GITHUB_OUTPUT
          "report_path=$reportPath" >> $env:GITHUB_OUTPUT

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Enable Corepack
        shell: bash
        run: corepack enable

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Verify Bun
        shell: bash
        run: bun --version

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.23"
          cache: false

      - name: Record persistent target state before build
        id: target_before
        shell: pwsh
        run: |
          $count = if (Test-Path $env:CARGO_TARGET_DIR) { (Get-ChildItem $env:CARGO_TARGET_DIR -Recurse -Force -ErrorAction SilentlyContinue | Measure-Object).Count } else { 0 }
          Write-Host "persistent-cache: target_entries_before_build=$count"
          "entry_count=$count" >> $env:GITHUB_OUTPUT

      - name: Build release binary
        shell: bash
        env:
          TOOLCHAIN_INSTALLER_REPO_DIR_BASH: ${{ steps.sync.outputs.repo_dir_bash }}
        run: |
          cd "$TOOLCHAIN_INSTALLER_REPO_DIR_BASH"
          cargo build --locked --release

      - name: Live install smoke
        shell: bash
        env:
          TOOLCHAIN_INSTALLER_REPO_DIR_BASH: ${{ steps.sync.outputs.repo_dir_bash }}
        run: |
          cd "$TOOLCHAIN_INSTALLER_REPO_DIR_BASH"
          python scripts/install_smoke.py --binary target/release/toolchain-installer

      - name: Summarize persistent cache state
        if: always()
        shell: pwsh
        run: |
          $report = Get-Content "${{ steps.sync.outputs.report_path }}" | ConvertFrom-Json
          $afterCount = if (Test-Path $env:CARGO_TARGET_DIR) { (Get-ChildItem $env:CARGO_TARGET_DIR -Recurse -Force -ErrorAction SilentlyContinue | Measure-Object).Count } else { 0 }
          $warmTarget = [int]${{ steps.target_before.outputs.entry_count }} -gt 0
          $warmCargoRegistry = [bool]$report.before.cargo_registry_exists

          $lines = @(
            "### Windows persistent workspace cache"
            "- repo dir: $($report.toolchain_installer.repo_dir)"
            "- synced sha: $($report.toolchain_installer.head)"
            "- mirror existed before run: $($report.toolchain_installer.mirror_existed_before)"
            "- worktree existed before run: $($report.toolchain_installer.repo_existed_before)"
            "- cargo registry existed before run: $warmCargoRegistry"
            "- target existed before run: $($report.before.target_exists)"
            "- target entries before build: ${{ steps.target_before.outputs.entry_count }}"
            "- target entries after build: $afterCount"
            "- warm cache hit: $([bool]($warmTarget -or $warmCargoRegistry))"
          )

          $lines | ForEach-Object { Write-Host $_ }
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ($lines -join "`n")

  release-catalog-smoke:
    name: release-catalog-smoke (windows-latest)
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on:
      group: windows-local
      labels: omne42-local
    concurrency:
      group: persistent-worktree-${{ github.repository }}
      cancel-in-progress: false
    env:
      GITHUB_TOKEN: ${{ github.token }}
      TOOLCHAIN_INSTALLER_GITHUB_TOKEN: ${{ github.token }}
    steps:
      - name: Sync persistent workspace and shared deps
        id: sync
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          function Sync-Repo {
            param(
              [string]$RepoUrl,
              [string]$RepoDir,
              [string]$MirrorDir,
              [string]$Ref
            )

            $repoExists = Test-Path (Join-Path $RepoDir ".git")
            $mirrorExists = Test-Path $MirrorDir

            New-Item -ItemType Directory -Force -Path (Split-Path $RepoDir -Parent) | Out-Null
            New-Item -ItemType Directory -Force -Path (Split-Path $MirrorDir -Parent) | Out-Null

            git config --global http.version HTTP/1.1
            git config --global --add safe.directory $RepoDir

