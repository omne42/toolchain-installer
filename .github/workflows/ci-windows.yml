          cargo build --locked --release

      - name: Live release catalog smoke
        shell: bash
        env:
          TOOLCHAIN_INSTALLER_REPO_DIR_BASH: ${{ steps.sync.outputs.repo_dir_bash }}
        run: |
          cd "$TOOLCHAIN_INSTALLER_REPO_DIR_BASH"
          python scripts/install_smoke.py --binary target/release/toolchain-installer --phase release_catalog

