          $foundation = Sync-Repo "https://github.com/omne42/omne_foundation.git" $env:OMNE_FOUNDATION_REPO_DIR $env:OMNE_FOUNDATION_MIRROR_DIR "origin/main"
          $runtime = Sync-Repo "https://github.com/omne42/omne-runtime.git" $env:OMNE_RUNTIME_REPO_DIR $env:OMNE_RUNTIME_MIRROR_DIR "origin/main"

          $repoDirBash = To-BashPath $env:TOOLCHAIN_INSTALLER_REPO_DIR

          $report = [ordered]@{
            before = $before
            toolchain_installer = [ordered]@{
              repo_dir = $env:TOOLCHAIN_INSTALLER_REPO_DIR
              repo_dir_bash = $repoDirBash
